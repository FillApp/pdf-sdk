name: Release

# Publishes to npm on tag push using the NPM_TOKEN repo secret.
#
# Before the first tag push:
#   1. Generate a granular access token on npmjs.com with Read+Write on the
#      @fillapp scope. Copy it.
#   2. Add it to this repo: Settings → Secrets and variables → Actions →
#      New repository secret → name `NPM_TOKEN`, paste the value.
#   3. Uncomment the `push.tags` trigger below so tag pushes auto-publish.
#   4. Cut a release: `npm version patch && git push && git push --tags`.
#      Or trigger manually from the Actions tab (workflow_dispatch).
#
# While the tag trigger is commented out, you can still dry-run the full
# pipeline from the Actions tab to validate it end to end. If NPM_TOKEN is
# missing, the publish step falls back to --dry-run so nothing leaks.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish with --dry-run (no bytes uploaded)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Check for NPM_TOKEN
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not set — publish step will run as --dry-run only."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - name: Verify tag matches package.json (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match package.json ($PKG_VERSION)."
            exit 1
          fi

      # prepublishOnly runs typecheck + lint + test + build.
      - run: npm run prepublishOnly

      - name: Dry-run publish
        if: steps.token.outputs.present == 'false' || inputs.dry_run == true
        run: npm publish --dry-run --provenance --access public

      - name: Publish to npm
        if: steps.token.outputs.present == 'true' && inputs.dry_run != true && startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
