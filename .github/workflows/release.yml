name: Release

# DISABLED until NPM_TOKEN is added to the repo secrets.
#
# When ready to publish:
#   1. Add an npm automation token to repo secrets as `NPM_TOKEN`.
#      Scope: the @fillapp npm org with "Read and write" packages access.
#   2. Uncomment the `push.tags` trigger below so tag pushes auto-publish.
#   3. Cut a release by pushing a tag: `git tag v0.2.0 && git push origin v0.2.0`.
#      Or trigger manually from the Actions tab (workflow_dispatch).
#
# While disabled, the workflow can still be dispatched manually but the
# publish step will no-op without NPM_TOKEN present.
on:
  # push:
  #   tags:
  #     - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish with --dry-run (no bytes uploaded)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Check for NPM_TOKEN
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not set — release workflow will stop before publishing."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - name: Verify tag matches package.json (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag ($TAG_VERSION) does not match package.json ($PKG_VERSION)."
            exit 1
          fi

      # prepublishOnly runs typecheck + lint + test + build.
      - run: npm run prepublishOnly

      - name: Dry-run publish
        if: steps.token.outputs.present == 'false' || inputs.dry_run == true
        run: npm publish --dry-run --provenance --access public

      - name: Publish to npm
        if: steps.token.outputs.present == 'true' && inputs.dry_run != true && startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
