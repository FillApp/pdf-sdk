<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>pdf-sdk browser-side generate</title>
  </head>
  <body>
    <div id="status">loading</div>
    <script type="module">
      import {
        PdfSdk,
        base64ToBytes,
        createBrowserEngine,
      } from "/sdk-bundle.mjs";

      const enginePromise = createBrowserEngine();

      window.runBrowserGenerate = async function runBrowserGenerate({
        pdfBase64,
        textFillsByAcroName,
      }) {
        const engine = await enginePromise;
        const bytes = base64ToBytes(pdfBase64);
        const sdk = await PdfSdk.load(bytes, { engine });
        for (const [acroName, value] of textFillsByAcroName) {
          const field = sdk
            .getFields()
            .find(
              (f) => f.source === "acroform" && f.acroFieldName === acroName,
            );
          if (!field) throw new Error("No field named " + acroName);
          sdk.setFieldValue(field.id, value);
        }
        const out = await sdk.generate();
        return Array.from(out);
      };

      document.getElementById("status").textContent = "ready";
    </script>
  </body>
</html>
